<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCC 2026</title>

    <style>
        :root {
            --blue: #00bfff;
            --bg: #05070a;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: Arial, sans-serif;
            color: white;
        }

        .box {
            border: 1px solid rgba(0,191,255,0.4);
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,191,255,0.15);
        }

        .box:hover { 
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 94, 255, 0.2); 
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--blue);
            text-shadow: 0 0 10px rgba(0, 140, 255, 0.5);
        }

        p {
            font-weight: 300;
            color: #ccc;
            margin-bottom: 2rem;
        }

        #date {
            font-family: monospace;
            color: var(--blue);
            font-size: 1.2rem;
            padding: 10px 20px;
        }

        .status {
            font-size: 1rem;
            padding: 5px 15px;
            color: #00a2ff;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="status">● running</div>
        <h1>NCC 2026</h1>
        <p>Open Recruitment Admin</p>
        <div id="date"></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById("date").innerHTML = now.toLocaleString();
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
